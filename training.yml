###############
## Fine-tuning CTM on UFO-120 dataset
####

GPU: [0]

VERBOSE: True

MODEL:
  SESSION: 'model_UFO'            # Separate session — keeps CycleGAN weights safe
  MODE: 'CTM'                     # Must be 'CTM' for the CTM model training

# Optimization arguments.
OPTIM:
  BATCH_SIZE: 4                   # UFO images are 256x256, can fit more per batch
  NUM_EPOCHS: 30                  # Fine-tuning needs fewer epochs than training from scratch
  LR_INITIAL: 2e-5                # Lower LR than from-scratch (1e-4) to avoid overwriting learned features
  LR_MIN: 1e-7                    # Minimum LR at end of cosine annealing

TRAINING:
  VAL_AFTER_EVERY: 1              # Validate every epoch and save best
  RESUME: True                    # START from CycleGAN pre-trained weights (fine-tuning!)
  TRAIN_PS: 256                   # Patch size must match model input (256x256)
  VAL_PS: 256                     # Validation patch size
  TRAIN_DIR: './dataset/UFO-120/train_val_paired'  # Folder with input/ and target/ subfolders
  VAL_DIR: './dataset/UFO-120/train_val_paired'    # Same folder (val split inside DataLoader)
  SAVE_DIR: './checkpoints'

